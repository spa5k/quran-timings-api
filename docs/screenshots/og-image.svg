<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Quran Timings Desk Open Graph Image</title>
  <desc id="desc">A warm paper themed social card for Quran Timings Desk with timeline accents.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9f3e8" />
      <stop offset="50%" stop-color="#f3ead8" />
      <stop offset="100%" stop-color="#efe3cf" />
    </linearGradient>

    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(184 86) rotate(20) scale(330 230)">
      <stop offset="0%" stop-color="#0f7a58" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#0f7a58" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowRust" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1060 110) rotate(180) scale(320 250)">
      <stop offset="0%" stop-color="#c0452d" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#c0452d" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(820 560) rotate(180) scale(360 250)">
      <stop offset="0%" stop-color="#b2893c" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#b2893c" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="seal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#221f19" />
      <stop offset="100%" stop-color="#15130f" />
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f7a58" />
      <stop offset="100%" stop-color="#b2893c" />
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0e0c09" flood-opacity="0.16" />
    </filter>

    <pattern id="paperGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#15130f" stroke-opacity="0.045" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowGreen)" />
  <rect width="1200" height="630" fill="url(#glowRust)" />
  <rect width="1200" height="630" fill="url(#glowGold)" />
  <rect width="1200" height="630" fill="url(#paperGrid)" opacity="0.34" />

  <rect x="54" y="58" width="1092" height="514" rx="32" fill="#fff8e9" stroke="#15130f" stroke-opacity="0.12" filter="url(#softShadow)" />

  <g transform="translate(98 108)">
    <rect width="72" height="72" rx="18" fill="url(#seal)" />
    <text x="36" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace" font-size="28" font-weight="700" fill="#fff">QTA</text>
  </g>

  <text x="188" y="126" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace" font-size="15" letter-spacing="2.4" fill="#5a5348">SPA5K / QURAN TIMINGS API</text>
  <text x="188" y="190" font-family="'Fraunces', Georgia, serif" font-size="68" font-weight="700" letter-spacing="-1.2" fill="#15130f">Quran Timings Desk</text>
  <text x="188" y="226" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="28" fill="#4b4439">Ayah and word-level timing data for reciters, surah by surah.</text>

  <g transform="translate(96 292)">
    <rect width="1008" height="220" rx="24" fill="#fffdfa" stroke="#15130f" stroke-opacity="0.1" />
    <text x="32" y="48" font-family="'Fraunces', Georgia, serif" font-size="38" font-weight="650" fill="#15130f">Timeline Quality</text>

    <rect x="32" y="76" width="944" height="20" rx="10" fill="#ece9df" />
    <rect x="32" y="76" width="702" height="20" rx="10" fill="url(#accent)" />
    <circle cx="734" cy="86" r="12" fill="#0f7a58" />
    <circle cx="734" cy="86" r="5" fill="#fff" />

    <rect x="32" y="120" width="300" height="64" rx="16" fill="#f4f8f5" stroke="#0f7a58" stroke-opacity="0.3" />
    <text x="54" y="148" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace" font-size="16" font-weight="700" fill="#0f7a58">API</text>
    <text x="54" y="168" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="16" fill="#2b261e">00:00.595 -> 00:04.759</text>

    <rect x="352" y="120" width="300" height="64" rx="16" fill="#f9f2f0" stroke="#c0452d" stroke-opacity="0.28" />
    <text x="374" y="148" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace" font-size="16" font-weight="700" fill="#c0452d">REF</text>
    <text x="374" y="168" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="16" fill="#2b261e">00:00.000 -> 00:04.855</text>

    <rect x="672" y="120" width="304" height="64" rx="16" fill="#f6f1e8" stroke="#b2893c" stroke-opacity="0.36" />
    <text x="694" y="148" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace" font-size="16" font-weight="700" fill="#7b5f22">DRIFT</text>
    <text x="694" y="168" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="16" fill="#2b261e">Delta +595ms / -96ms</text>
  </g>

  <text x="96" y="548" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="20" fill="#4f483d">Open reciter metadata and timings JSON through CDN endpoints.</text>
</svg>
